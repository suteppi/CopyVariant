name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          zip -r "net.suteppi.copyvariant-${{ steps.version.outputs.version }}.zip" . \
            --exclude ".git*" --exclude ".github*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "net.suteppi.copyvariant-${{ steps.version.outputs.version }}.zip"
          tag_name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true

      - name: Trigger VPM update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.VPM_REPO_TOKEN }}
          repository: suteppi/vpm-repo
          event-type: package-release
